name: Deploy Backend to GoDaddy

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'server.js'
      - 'package.json'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GoDaddy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 21098
          script: |
            # Navigate to home directory
            cd ~

            # Clone or pull latest code
            if [ -d "videotree" ]; then
              cd videotree
              git pull origin main
            else
              git clone https://github.com/thebyte24/videotree.git videotree
              cd videotree
            fi

            # Install server dependencies
            cd server
            npm install --production

            # Restart with PM2 (install if not present)
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            pm2 describe videotree-server > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 restart videotree-server
            else
              pm2 start server.js --name videotree-server
            fi

            pm2 save
            echo "✓ Deployment complete"
